version: "3.9"

services:
  db:
    image: postgres:15
    container_name: hron-postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: ghcr.io/jbro910/sample-api:latest
    container_name: hron-backend
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: always

volumes:
  postgres_data:
